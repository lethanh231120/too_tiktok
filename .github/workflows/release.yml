name: Build and Release App

on:
  push:
    tags:
      - 'v*' # Trigger build when pushing a tag like v1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React App (Frontend)
        run: npm run react-build

      - name: Build Electron App (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac

      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win

      - name: Upload binaries to MinIO
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: vuluu2k
          AWS_SECRET_ACCESS_KEY: vuluu2kTest
          AWS_DEFAULT_REGION: us-east-1
          MINIO_URL: https://ss3.fastfol.io.vn
          BUCKET_NAME: tiktok-releases
        run: |
          # Ensure Bucket exists and set public download policy (fail gracefully if already set)
          aws s3 mb s3://$BUCKET_NAME --endpoint-url $MINIO_URL || true
          echo '{"Version":"2012-10-17","Statement":[{"Action":["s3:GetObject"],"Effect":"Allow","Principal":{"AWS":["*"]},"Resource":["arn:aws:s3:::'$BUCKET_NAME'/*"]}]}' > policy.json
          aws s3api put-bucket-policy --bucket $BUCKET_NAME --policy file://policy.json --endpoint-url $MINIO_URL || true
          
          # Sync dist outputs to MinIO
          aws s3 cp dist/ s3://$BUCKET_NAME/ --recursive --exclude "*" --include "*.exe" --include "*.dmg" --include "*-mac.zip" --endpoint-url $MINIO_URL
